<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOB Farm - Realtime Monitor</title>
    <style>
        :root { --main: #8B4513; --bg: #f7f1e3; --card: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); text-align: center; color: #333; padding: 20px; margin: 0; }
        .farm-card { max-width: 450px; margin: auto; background: var(--card); padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 4px solid #d1ccc0; }
        h1 { color: var(--main); margin-bottom: 10px; font-size: 1.5rem; }
        
        /* Trạng thái kết nối */
        .status { padding: 12px; border-radius: 12px; background: #eee; margin-bottom: 20px; font-weight: bold; border: 1px solid #ccc; transition: 0.3s; }
        .connected { color: #2ecc71; background: #e8f9f0; border-color: #2ecc71; }
        .disconnected { color: #e74c3c; background: #fdf2f2; border-color: #e74c3c; }

        /* Lưới hiển thị cảm biến */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .box { padding: 20px; background: #fdfaf0; border-radius: 18px; border: 1px solid #ffeaa7; }
        .label { font-size: 0.8rem; color: #7f8c8d; text-transform: uppercase; font-weight: bold; }
        .val { font-size: 2.2rem; color: #cd6133; font-weight: 800; display: block; margin: 5px 0; }

        /* Uptime section */
        .uptime { margin-bottom: 25px; padding: 12px; background: #f0f3f4; border-radius: 15px; font-size: 1rem; }
        #timeValue { font-weight: 900; color: var(--main); font-size: 1.3rem; }

        /* Nút bấm */
        button { padding: 15px; width: 100%; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 1rem; }
        #connectBtn { background: var(--main); color: white; margin-bottom: 15px; box-shadow: 0 4px #5d2e0d; }
        #connectBtn:active { transform: translateY(4px); box-shadow: 0 0; }
        
        .controls { display: flex; gap: 10px; }
        .btn-on { background: #27ae60; color: white; }
        .btn-off { background: #c0392b; color: white; }
        
        button:disabled { background: #bdc3c7 !important; opacity: 0.6; cursor: not-allowed; box-shadow: none !important; transform: none !important; }
    </style>
</head>
<body>

    <div class="farm-card">
        <h1>B.O.B SMART MONITOR</h1>
        <div id="statusLabel" class="status disconnected">Chưa kết nối thiết bị</div>
        
        <button id="connectBtn">KẾT NỐI HỆ THỐNG BOB</button>

        <div class="grid">
            <div class="box">
                <span class="label">Nhiệt độ</span>
                <span id="tempValue" class="val">--</span><small>°C</small>
            </div>
            <div class="box">
                <span class="label">Độ ẩm</span>
                <span id="humidValue" class="val">--</span><small>%</small>
            </div>
        </div>

        <div class="uptime">
            Thời gian hoạt động: <span id="timeValue">0</span>s
        </div>

        <div class="controls">
            <button class="btn-on" id="onBtn" disabled>BẬT LED</button>
            <button class="btn-off" id="offBtn" disabled>TẮT LED</button>
        </div>
    </div>

    <script>
        // UUID - Phải trùng khớp 100% với ESP32
        const SERVICE_UUID = "3d88d953-7f54-47e4-a374-0db3dab7ea7c";
        const TIME_UUID    = "b373a6bd-57ef-4ddb-801b-b08fda6c3fa7";
        const LED_UUID     = "98edf6bd-db03-4077-9dde-d85fd41ead83";
        const SENSOR_UUID  = "efc17762-aaf5-47cc-9df6-5244046cfc3b";

        let bleDevice = null;
        let ledChar = null;

        const connectBtn = document.getElementById('connectBtn');
        const statusLabel = document.getElementById('statusLabel');

        connectBtn.addEventListener('click', async () => {
            try {
                statusLabel.innerText = "Đang quét thiết bị...";
                
                // Quét thiết bị với tên lọc là "BOB"
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ name: "BOB" }],
                    optionalServices: [SERVICE_UUID]
                });

                // Lắng nghe sự kiện khi mất kết nối
                bleDevice.addEventListener('gattserverdisconnected', onDisconnected);

                statusLabel.innerText = "Đang bắt tay với BOB...";
                const server = await bleDevice.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);

                // 1. Nhận dữ liệu Cảm biến (Notify tự động)
                const sensorChar = await service.getCharacteristic(SENSOR_UUID);
                await sensorChar.startNotifications();
                sensorChar.addEventListener('characteristicvaluechanged', (e) => {
                    const str = new TextDecoder().decode(e.target.value);
                    const p = str.split('\t'); // Tách theo dấu Tab như sprintf trong ESP32
                    if (p.length >= 2) {
                        document.getElementById('tempValue').innerText = p[0].trim();
                        document.getElementById('humidValue').innerText = p[1].trim();
                    }
                });

                // 2. Nhận dữ liệu Uptime (Notify tự động)
                const timeChar = await service.getCharacteristic(TIME_UUID);
                await timeChar.startNotifications();
                timeChar.addEventListener('characteristicvaluechanged', (e) => {
                    // Đọc giá trị 32-bit nhị phân từ ESP32 (Little Endian)
                    const uptime = e.target.value.getUint32(0, true);
                    document.getElementById('timeValue').innerText = uptime;
                });

                // 3. Thiết lập điều khiển LED
                ledChar = await service.getCharacteristic(LED_UUID);

                // Cập nhật giao diện khi thành công
                statusLabel.innerText = "Hệ thống Trực tuyến";
                statusLabel.className = "status connected";
                connectBtn.disabled = true;
                document.getElementById('onBtn').disabled = false;
                document.getElementById('offBtn').disabled = false;

            } catch (err) {
                console.error(err);
                statusLabel.innerText = "Lỗi kết nối: " + err.message;
                statusLabel.className = "status disconnected";
            }
        });

        // Xử lý khi ngắt kết nối
        function onDisconnected() {
            statusLabel.innerText = "Mất kết nối!";
            statusLabel.className = "status disconnected";
            connectBtn.disabled = false;
            document.getElementById('onBtn').disabled = true;
            document.getElementById('offBtn').disabled = true;
            document.getElementById('tempValue').innerText = "--";
            document.getElementById('humidValue').innerText = "--";
        }

        // Gửi lệnh điều khiển LED
        async function sendLed(val) {
            if (ledChar) {
                try {
                    await ledChar.writeValue(new Uint8Array([val]));
                    console.log("Đã gửi lệnh:", val);
                } catch (e) { console.error("Lỗi gửi lệnh:", e); }
            }
        }

        document.getElementById('onBtn').addEventListener('click', () => sendLed(1));
        document.getElementById('offBtn').addEventListener('click', () => sendLed(0));

        // Giải phóng GATT khi đóng trình duyệt
        window.addEventListener('beforeunload', () => {
            if (bleDevice && bleDevice.gatt.connected) {
                bleDevice.gatt.disconnect();
            }
        });
    </script>
</body>
</html>
