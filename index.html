<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Potato Farm - Pro Farmer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f7f1e3; text-align: center; color: #333; }
        .farm-card { max-width: 500px; margin: 20px auto; background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); border: 4px solid #d1ccc0; }
        h1 { color: #8B4513; margin-bottom: 5px; }
        .status { padding: 8px; border-radius: 10px; background: #eee; margin-bottom: 20px; font-weight: bold; font-size: 0.9rem; }
        .connected { color: #2ecc71; background: #e8f9f0; }
        
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .sensor-box { padding: 15px; background: #fdfaf0; border-radius: 15px; border: 1px solid #ffeaa7; }
        .sensor-label { font-size: 0.8rem; color: #666; text-transform: uppercase; display: block; }
        .sensor-val { font-size: 1.8rem; color: #cd6133; font-weight: bold; }

        .section { margin: 15px 0; padding: 15px; border: 1px dashed #aaa; border-radius: 10px; }
        button { padding: 12px 25px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; font-weight: bold; width: 100%; margin-top: 10px; }
        #connectBtn { background-color: #8B4513; color: white; }
        #readDataBtn { background-color: #f39c12; color: white; }
        .btn-led-on { background-color: #27ae60; color: white; }
        .btn-led-off { background-color: #c0392b; color: white; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        button:hover:not(:disabled) { opacity: 0.9; transform: scale(1.02); }
    </style>
</head>
<body>

    <div class="farm-card">
        <h1>🥔 Mr. Farmer 👨‍🌾</h1>
        <div id="statusLabel" class="status">Chưa kết nối Bluetooth</div>

        <button id="connectBtn">Kết nối hệ thống BOB</button>

        <div class="grid-container">
            <div class="sensor-box">
                <span class="sensor-label">Nhiệt độ</span>
                <span id="tempValue" class="sensor-val">--</span><span class="sensor-val">°C</span>
            </div>
            <div class="sensor-box">
                <span class="sensor-label">Độ ẩm</span>
                <span id="humidValue" class="sensor-val">--</span><span class="sensor-val">%</span>
            </div>
        </div>

        <div class="section">
            <span class="sensor-label">Thời gian hoạt động (Uptime):</span>
            <span id="timeValue" style="font-size: 1.2rem; font-weight: bold; color: #8B4513;">0s</span>
            <button id="readDataBtn" disabled>Cập nhật toàn bộ cảm biến</button>
        </div>

        <div class="section">
            <span class="sensor-label">Điều khiển Máy Bơm (LED 27):</span>
            <div style="display: flex; gap: 10px;">
                <button class="btn-led-on" id="ledOnBtn" disabled>BẬT</button>
                <button class="btn-led-off" id="ledOffBtn" disabled>TẮT</button>
            </div>
        </div>
    </div>

    <script>
        // Copy chính xác UUID từ ESP32
        const SERVICE_UUID = "3d88d953-7f54-47e4-a374-0db3dab7ea7c";
        const TIME_CHAR_UUID = "b373a6bd-57ef-4ddb-801b-b08fda6c3fa7";
        const LED_CHAR_UUID = "98edf6bd-db03-4077-9dde-d85fd41ead83";
        const SENSOR_CHAR_UUID = "efc17762-aaf5-47cc-9df6-5244046cfc3b";

        let timeChar, ledChar, sensorChar;

        const connectBtn = document.getElementById('connectBtn');
        const statusLabel = document.getElementById('statusLabel');

        connectBtn.addEventListener('click', async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: "BOB" }],
                    optionalServices: [SERVICE_UUID]
                });

                statusLabel.innerText = "Đang kết nối...";
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);

                // Lấy các Characteristic
                timeChar = await service.getCharacteristic(TIME_CHAR_UUID);
                ledChar = await service.getCharacteristic(LED_CHAR_UUID);
                sensorChar = await service.getCharacteristic(SENSOR_CHAR_UUID);

                statusLabel.innerText = "Đã kết nối với Nông Trại!";
                statusLabel.classList.add('connected');
                connectBtn.disabled = true;
                document.querySelectorAll('button:disabled').forEach(btn => btn.disabled = false);

            } catch (error) {
                console.error(error);
                statusLabel.innerText = "Lỗi: " + error.message;
            }
        });

        // HÀM ĐỌC DỮ LIỆU TỔNG HỢP
        document.getElementById('readDataBtn').addEventListener('click', async () => {
            if (!sensorChar || !timeChar) return;

            try {
                // 1. Đọc thời gian (Uint32)
                const timeData = await timeChar.readValue();
                document.getElementById('timeValue').innerText = timeData.getUint32(0, true) + "s";

                // 2. Đọc Nhiệt độ & Độ ẩm (Dạng chuỗi "temp \t humid")
                const sensorData = await sensorChar.readValue();
                const decoder = new TextDecoder('utf-8');
                const decodedString = decoder.decode(sensorData);
                console.log("Dữ liệu thô:", decodedString);

                // Tách chuỗi dựa trên ký tự tab (\t)
                const parts = decodedString.split('\t');
                if (parts.length >= 2) {
                    document.getElementById('tempValue').innerText = parts[0].trim();
                    document.getElementById('humidValue').innerText = parts[1].trim();
                } else if (decodedString.includes("loi")) {
                    alert("Cảm biến DHT11 gặp lỗi hoặc chưa sẵn sàng!");
                }

            } catch (err) {
                console.error("Lỗi cập nhật:", err);
            }
        });

        // HÀM ĐIỀU KHIỂN LED
        async function controlLed(state) {
            if (!ledChar) return;
            try {
                await ledChar.writeValueWithResponse(new Uint8Array([state]));
                console.log("LED -> " + (state ? "ON" : "OFF"));
            } catch (err) { console.error(err); }
        }

        document.getElementById('ledOnBtn').addEventListener('click', () => controlLed(1));
        document.getElementById('ledOffBtn').addEventListener('click', () => controlLed(0));

    </script>
</body>
</html>
